name: Count Arduino Files

on:
  push:
    branches:
      - main
      - dev
      - sensor-module
      - wireless-module

jobs:
  count-ino-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Count .ino files
        run: |
          python <<EOF
          import os

          count = 0
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".ino"):
                      count += 1

          print(f"Number of .ino files: {count}")
          EOF
